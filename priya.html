<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Quest Challenge</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
}

.workout-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
text-align:center;
}

button{
background:#ff4d6d;
border:none;
color:white;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#00d4ff;
color:black;
}

#videoSection{
text-align:center;
padding:40px;
}

iframe{
width:90%;
max-width:700px;
height:400px;
border-radius:10px;
border:none;
}

</style>

</head>

<body>

<header>
<h1>Fitness Quest Challenge</h1>
<p>Select a workout and start exercising</p>
</header>

<section class="workout-grid" id="workoutContainer"></section>

<section id="videoSection">

<h2>Workout Video</h2>

<iframe id="videoPlayer"
src="https://www.youtube.com/embed/IODxDxX7oi4">
</iframe>

</section>

<script>

/* WORKOUT DATA */

const workouts=[

{
name:"Push Ups",
calories:100,
video:"https://www.youtube.com/embed/IODxDxX7oi4"
},

{
name:"Squats",
calories:120,
video:"https://www.youtube.com/embed/aclHkVaku9U"
},

{
name:"Plank",
calories:80,
video:"https://www.youtube.com/embed/pSHjTRCQxIw"
},

{
name:"Jump Rope",
calories:150,
video:"https://www.youtube.com/embed/1BZM2Vre5oc"
},

{
name:"Burpees",
calories:200,
video:"https://www.youtube.com/embed/TU8QYVW0gDU"
}

]

const container=document.getElementById("workoutContainer")
const player=document.getElementById("videoPlayer")

/* CREATE WORKOUT CARDS */

workouts.forEach(w=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<h3>${w.name}</h3>
<p>Burn ${w.calories} calories</p>
<button data-video="${w.video}">Start Workout</button>
`

container.appendChild(card)

})

/* BUTTON EVENT */

container.addEventListener("click",function(e){

if(e.target.tagName==="BUTTON"){

const video=e.target.dataset.video

player.src=video

window.scrollTo({
top:document.getElementById("videoSection").offsetTop,
behavior:"smooth"
})

}

})

</script>

</body>
</html>
